name: Desktop Release

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            dist_script: desktop:dist:linux
            publish_script: "npm --workspace @openstudio/desktop run dist:linux:publish"
            artifact_path: apps/desktop/dist/linux/**
          - os: windows-latest
            dist_script: desktop:dist:windows
            publish_script: "npm --workspace @openstudio/desktop run dist:windows:publish"
            artifact_path: apps/desktop/dist/windows/**
          - os: macos-latest
            dist_script: desktop:dist:macos
            publish_script: "npm --workspace @openstudio/desktop run dist:macos:publish"
            artifact_path: apps/desktop/dist/macos/**

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build desktop artifacts (PR/branch)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run ${{ matrix.dist_script }}

      - name: Build and publish desktop artifacts (tag)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: ${{ matrix.publish_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_OWNER: ${{ github.repository_owner }}
          GH_REPO: ${{ github.event.repository.name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: warn
